<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fav-icon.fw.png" />
    <link rel="apple-touch-icon" href="/fav-icon.fw.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdsOPS - Painel de Publicidade</title>
    <meta name="description" content="Painel abrangente de análise de publicidade para Meta, TikTok e Google Ads">
    <meta name="theme-color" content="#3B82F6" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://adsops.com/" />
    <meta property="og:title" content="AdsOPS - Painel de Publicidade" />
    <meta property="og:description" content="Painel abrangente de análise de publicidade para Meta, TikTok e Google Ads" />
    <meta property="og:image" content="/fav-icon.fw.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://adsops.com/" />
    <meta property="twitter:title" content="AdsOPS - Painel de Publicidade" />
    <meta property="twitter:description" content="Painel abrangente de análise de publicidade para Meta, TikTok e Google Ads" />
    <meta property="twitter:image" content="/fav-icon.fw.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Facebook JavaScript SDK - carregado de forma assincrona para nao bloquear a pagina -->
    <!-- Necessario para o Facebook Login for Business (FLFB) -->
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId: document.querySelector('meta[name="fb-app-id"]')?.content || '',
          cookie: true,
          xfbml: false,
          version: 'v21.0'
        });
      };
      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) { return; }
        js = d.createElement(s); js.id = id;
        js.src = "https://connect.facebook.net/pt_BR/sdk.js";
        js.async = true; js.defer = true;
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
